<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <title>Smash Up Randomizer</title>
    <defs>
        <linearGradient id="surMark" x1="8" y1="10" x2="56" y2="54" gradientUnits="userSpaceOnUse">
            <stop stop-color="#818cf8"/>
            <stop offset="0.45" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
        <linearGradient id="surMarkStroke" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1" stop-opacity="0.55"/>
            <stop offset="1" stop-color="#8b5cf6" stop-opacity="0.35"/>
        </linearGradient>
        <filter id="surMarkShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.45"/>
        </filter>
    </defs>
    <!-- App chip -->
    <rect width="64" height="64" rx="16" fill="#0c0c0f"/>
    <rect x="1" y="1" width="62" height="62" rx="15" stroke="url(#surMarkStroke)" stroke-width="1.25"/>
    <!-- Back card -->
    <rect x="11" y="19" width="28" height="36" rx="5" fill="#27272a" transform="rotate(-12 25 37)"/>
    <!-- Front card -->
    <rect x="25" y="13" width="28" height="36" rx="5" fill="url(#surMark)" filter="url(#surMarkShadow)" transform="rotate(10 39 31)"/>
    <!-- Random / shuffle dots -->
    <circle cx="46" cy="21" r="3.25" fill="#ddd6fe"/>
    <circle cx="17" cy="44" r="2.25" fill="#a5b4fc" opacity="0.9"/>
    <circle cx="24" cy="50" r="1.5" fill="#818cf8" opacity="0.75"/>
</svg>
